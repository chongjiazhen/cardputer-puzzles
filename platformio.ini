[platformio]
src_dir = src

[env:puzzles]
platform = espressif32
framework = arduino
board = m5stack-stamps3
monitor_speed = 115200
board_build.flash_size = 8MB
lib_deps =
    m5stack/M5Cardputer@1.1.1   ; pinned exact for reproducible firmware builds
build_flags =
    -DCARDPUTER_ADV
    -DCOMBINED
    -DNO_TGMATH_H
    -DARDUINO_USB_CDC_ON_BOOT=1   ; route Serial to USB-CDC: stable COM port across reflash + fatal()/boot traces visible
    -Isrc/puzzles
    -Iupstream
; Compile our frontend + the selected upstream core/game .c files.
; Exclude host-only test sources (each has its own main(), which breaks the device link).
build_src_filter =
    +<puzzles/>
    -<puzzles/*_test.cpp>   ; host tests have their own main(); never link into firmware
    +<../upstream/combi.c> +<../upstream/divvy.c> +<../upstream/draw-poly.c>
    +<../upstream/drawing.c> +<../upstream/dsf.c> +<../upstream/findloop.c>
    +<../upstream/grid.c> +<../upstream/latin.c> +<../upstream/laydomino.c>
    +<../upstream/loopgen.c> +<../upstream/malloc.c> +<../upstream/matching.c>
    +<../upstream/midend.c> +<../upstream/misc.c> +<../upstream/penrose.c>
    +<../upstream/penrose-legacy.c> +<../upstream/ps.c> +<../upstream/random.c>
    +<../upstream/sort.c> +<../upstream/tdq.c> +<../upstream/tree234.c>
    +<../upstream/version.c>
    +<../upstream/net.c>
    +<../upstream/mines.c> +<../upstream/solo.c> +<../upstream/lightup.c>
    +<../upstream/filling.c> +<../upstream/bridges.c> +<../upstream/unequal.c>
    +<../upstream/tents.c>
    +<../upstream/blackbox.c> +<../upstream/cube.c> +<../upstream/dominosa.c>
    +<../upstream/fifteen.c> +<../upstream/flip.c> +<../upstream/flood.c>
    +<../upstream/galaxies.c> +<../upstream/guess.c> +<../upstream/hat.c>
    +<../upstream/inertia.c> +<../upstream/keen.c> +<../upstream/loopy.c>
    +<../upstream/magnets.c> +<../upstream/map.c> +<../upstream/mosaic.c>
    +<../upstream/netslide.c> +<../upstream/palisade.c> +<../upstream/pattern.c>
    +<../upstream/pearl.c> +<../upstream/pegs.c> +<../upstream/range.c>
    +<../upstream/rect.c> +<../upstream/samegame.c> +<../upstream/signpost.c>
    +<../upstream/singles.c> +<../upstream/sixteen.c> +<../upstream/slant.c>
    +<../upstream/spectre.c> +<../upstream/towers.c> +<../upstream/tracks.c>
    +<../upstream/twiddle.c> +<../upstream/undead.c> +<../upstream/unruly.c>
    +<../upstream/untangle.c>

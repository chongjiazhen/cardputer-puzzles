[platformio]
src_dir = src

[env:puzzles]
platform = espressif32
framework = arduino
board = m5stack-stamps3
monitor_speed = 115200
board_build.flash_size = 8MB
lib_deps =
    m5stack/M5Cardputer@^1.1.0
build_flags =
    -DCARDPUTER_ADV
    -DCOMBINED
    -Isrc/puzzles
    -Iupstream
